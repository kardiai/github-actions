name: Build image from master

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      image_label:
        required: true
        type: string
      image_version:
        type: string
      branch:
        type: string
      java_version:
        type: number
        default: 11

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set full image tag
        id: tag
        run: |
          # If no version provided, use "unknown"
          INPUT_VERSION="${{ inputs.image_version }}"
          if [ -z "$INPUT_VERSION" ]; then
            INPUT_VERSION="unknown"
          fi
          
          # Append timestamp if it does NOT start with v
          if [[ "$INPUT_VERSION" == v* ]]; then
            INPUT_VERSION="$INPUT_VERSION"
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            INPUT_VERSION="$INPUT_VERSION-$TIMESTAMP"
          fi
          
          echo "INPUT_VERSION=${INPUT_VERSION}" >> $GITHUB_ENV
          echo "Using image tag: $INPUT_VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ inputs.java_version }}
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Set POM version
        run: mvn -B versions:set -DnewVersion="${{ env.INPUT_VERSION }}" --file pom.xml

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Log in to Docker Hub
        uses: docker/login-action@49ed152c8eca782a232dede0303416e8f356c37b # v2.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3.1.1
        with:
          context: .
          push: true
          tags: ${{ inputs.image_tag }}
          labels: ${{ inputs.image_label }}

