name: Extract Service Documentation
description: >
  Graphify AST scan + AI extraction. Opens a PR with structured metadata
  in .extraction/output/. Requires .extraction/config.yaml in the caller repo.

inputs:
  anthropic_api_key:
    description: Anthropic API key for the AI extraction step
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Check config exists
      shell: bash
      run: |
        if [[ ! -f .extraction/config.yaml ]]; then
          echo "::error::.extraction/config.yaml not found. See onboarding instructions."
          exit 1
        fi

    - name: Install graphify
      shell: bash
      run: pip install graphifyy mcp pyyaml

    - name: "Phase 1: Scan"
      id: scan
      shell: bash
      run: python3 "${{ github.action_path }}/scan.py"

    - name: "Phase 2: AI Extraction"
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        claude_args: "--model claude-sonnet-4-6 --max-turns ${{ steps.scan.outputs.max_turns }} --mcp-config ${{ github.action_path }}/graphify-mcp.json"
        prompt: |
          Read ${{ github.action_path }}/extraction_agent.md for your instructions.
          Read .extraction/config.yaml for service configuration.
          Read README.md for business context and glossary.
          Generate the extraction output files in .extraction/output/ following the agent instructions exactly.

    - name: Write extraction metadata
      shell: bash
      run: |
        mkdir -p .extraction/output
        printf 'commit: "%s"\nextracted_at: "%s"\nbranch: "%s"\n' \
          "$(git rev-parse HEAD)" \
          "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          "$(git rev-parse --abbrev-ref HEAD)" \
          > .extraction/output/meta.yaml

    - name: Create PR with results
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "chore: update extraction metadata"
        branch: chore/extraction-update
        title: "chore: update extraction metadata"
        body: |
          Automated extraction of architecture metadata.

          Review the changes in `.extraction/output/` before merging.
        add-paths: .extraction/output/
        delete-branch: true
