name: Extract Service Documentation
description: >
  Graphify AST scan + AI extraction. Opens a PR with structured metadata
  in .extraction/output/. Requires .extraction/config.yaml in the caller repo.

inputs:
  anthropic_api_key:
    description: Anthropic API key for the AI extraction step
    required: true
  doc_generator_app_id:
    description: GitHub App ID used to create the extraction PR
    required: true
  doc_generator_access_key:
    description: GitHub App private key used to create the extraction PR
    required: true
  force_regenerate:
    description: Set to 'true' to force a full re-extraction ignoring previous meta.yaml
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Check config exists
      shell: bash
      run: |
        if [[ ! -f .extraction/config.yaml ]]; then
          echo "::error::.extraction/config.yaml not found. See onboarding instructions."
          exit 1
        fi

    - name: Install dependencies
      shell: bash
      run: |
        pip install graphifyy mcp pyyaml
        npm install -g @anthropic-ai/claude-code

    - name: Force regenerate
      if: inputs.force_regenerate == 'true'
      shell: bash
      run: |
        rm -rf .extraction/output/
        echo "::notice::Force regenerate enabled — previous extraction output cleared."

    - name: Fetch full git history
      if: inputs.force_regenerate == 'false'
      shell: bash
      run: |
        if git rev-parse --is-shallow-repository | grep -q true; then
          git fetch --unshallow
        fi

    - name: "Phase 1: Scan"
      id: scan
      shell: bash
      run: python3 "${{ github.action_path }}/scan.py"

    - name: "Phase 2: AI Extraction"
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        NO_COLOR: "1"
      run: |
        claude \
          --model claude-sonnet-4-6 \
          --max-turns "${{ steps.scan.outputs.max_turns }}" \
          --mcp-config "${{ github.action_path }}/graphify-mcp.json" \
          --allowedTools "Bash(git diff*),Read,Write,mcp__graphify__graph_stats,mcp__graphify__god_nodes,mcp__graphify__query_graph,mcp__graphify__get_community" \
          -p "Read ${{ github.action_path }}/extraction_agent.md and follow the instructions exactly." \
          | tee .extraction/agent-output.txt

    - name: "Phase 3: Validate and fix output"
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        NO_COLOR: "1"
      run: |
        claude \
          --model claude-sonnet-4-6 \
          --max-turns "${{ steps.scan.outputs.validate_max_turns }}" \
          --allowedTools "Read,Write,Edit,Grep,Glob" \
          -p "Read and validate all files in .extraction/output/. You have source-code access — use Grep/Read to verify claims against the code, not just the YAML. Check for and fix:
        1. Broken cross-references — every ID in capability_refs, flow_refs, operation_refs (endpoints.yaml, pages.yaml) must exist in capabilities.yaml, flows.yaml, or operations.yaml respectively; every capability_ref in flow steps must exist in capabilities.yaml; every dependency ID in capabilities and flows must exist in dependencies.yaml
        2. Entity relationship targets — every target in entities.yaml relationships must exist in entities.yaml
        3. Endpoint description accuracy (spot-check against source) — for any endpoint whose description could have been guessed from its path or HTTP verb (e.g. a GET described as an action, or an id like get-*/list-* that creates or mutates), open the handler in the source and confirm the description, auth, and response match what the code does. Fix any that describe the route name rather than the actual behavior.
        4. Status/state ownership (spot-check against source) — for any capability, flow, or entity lifecycle that claims this service writes a status/state value, grep the source for an assignment of that value (e.g. 'status =' or '.status ='). If the code only reads or compares the value, correct the text to attribute the write to the system that performs it.

        Read the affected files, fix all issues found, and report what was changed. If everything is valid, say so." \
          | tee -a .extraction/agent-output.txt

    - name: Publish agent summary
      shell: bash
      run: |
        if [[ -f .extraction/agent-output.txt ]]; then
          cat .extraction/agent-output.txt >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Check for output changes
      id: check-changes
      shell: bash
      run: |
        if git diff --quiet HEAD -- .extraction/output/ && \
           ! git ls-files --others --exclude-standard .extraction/output/ | grep -q .; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No output changes detected — skipping PR creation."
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Write extraction metadata
      if: steps.check-changes.outputs.changed == 'true'
      shell: bash
      run: |
        mkdir -p .extraction/output
        printf 'commit: "%s"\nextracted_at: "%s"\nbranch: "%s"\n' \
          "$(git rev-parse HEAD)" \
          "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          "$(git rev-parse --abbrev-ref HEAD)" \
          > .extraction/output/meta.yaml

    - name: Build PR body
      id: pr-body
      if: steps.check-changes.outputs.changed == 'true'
      shell: bash
      run: |
        {
          echo 'body<<EOF'
          echo 'Automated extraction of architecture metadata.'
          echo ''
          echo '---'
          echo ''
          cat .extraction/agent-output.txt
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Generate token for PR creation
      id: app-token
      if: steps.check-changes.outputs.changed == 'true'
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.doc_generator_app_id }}
        private-key: ${{ inputs.doc_generator_access_key }}
        owner: ${{ github.repository_owner }}

    - name: Create PR with results
      id: create-pr
      if: steps.check-changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.app-token.outputs.token }}
        commit-message: "chore: update extraction metadata"
        branch: chore/extraction-update
        title: "chore: update extraction metadata"
        body: ${{ steps.pr-body.outputs.body }}
        add-paths: .extraction/output/
        delete-branch: true
        reviewers: ${{ github.actor }}

    - name: Add PR link to summary
      if: steps.create-pr.outputs.pull-request-url != ''
      shell: bash
      run: echo "**Pull request:** ${{ steps.create-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
