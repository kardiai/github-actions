name: Check Build Before Release
description: Checks model version availability on S3 (MODEL) or Docker image presence on ECR (IMAGE)

inputs:
  check-type:
    description: Type of check - MODEL or IMAGE
    required: true
  aws-access-key-id:
    description: AWS access key ID (required for IMAGE check)
    required: false
    default: ''
  aws-secret-access-key:
    description: AWS secret access key (required for IMAGE check)
    required: false
    default: ''
  aws-region:
    description: AWS region (required for IMAGE check)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: pip3 install boto3 PyYAML

    - name: Configure AWS credentials
      if: inputs.check-type == 'IMAGE'
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      if: inputs.check-type == 'IMAGE'
      uses: aws-actions/amazon-ecr-login@v2.0.1

    - name: Run check
      shell: bash
      run: python3 "${{ github.action_path }}/check_build_before_release.py" ${{ inputs.check-type }}
